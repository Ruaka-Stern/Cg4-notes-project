<script>
var API_URL = "https://script.google.com/macros/s/AKfycbzXP3XYZrksjyCC-353Ao0mH7aL6Y-O39yfrfcpbbxn4htDoiZ8AV881j3yDDZkweqg/exec";

var user = JSON.parse(localStorage.getItem("cg4user"));

if(!user){
  document.getElementById("status").innerText = "Session expired. Please login again.";
  setTimeout(function(){
    window.location.href = "index.html";
  },1500);
}else{
  loadNotes(user);
}

function loadNotes(user){

  console.log("USER DATA:", user);
  console.log("LEVEL:", user.level);
  console.log("COURSES RAW:", user.courses);

  var cleanCourses = user.courses.map(function(c){
    return c.toString().trim();
  });

  console.log("COURSES CLEAN:", cleanCourses);

  fetch(API_URL,{
    method:"POST",
    body:new URLSearchParams({
      action:"getNotes",
      level:user.level,
      courses:cleanCourses.join(",")
    })
  })
  .then(res=>res.json())
  .then(data=>{
    console.log("API RESPONSE:", data);

    if(data.status != "success"){
      document.getElementById("status").innerText = "Failed to load notes.";
      return;
    }

    displayNotes(data.notes);
  })
  .catch(()=>{
    document.getElementById("status").innerText = "Network error.";
  });
}

function displayNotes(notes){

  var container = document.getElementById("notes");
  var status = document.getElementById("status");

  container.innerHTML = "";

  if(!notes || notes.length === 0){
    status.innerText = "No notes available for your courses.";
    return;
  }

  status.innerText = "Your Notes";

  notes.forEach(function(note){

    var div = document.createElement("div");
    div.className = "note";

    div.innerHTML = `
      <h3>${note.title}</h3>
      <p>Course Code: ${note.code}</p>
      <p>Type: ${note.type}</p>
      <a href="${note.link}" target="_blank">Open Note</a>
    `;

    container.appendChild(div);

  });

}
</script>
